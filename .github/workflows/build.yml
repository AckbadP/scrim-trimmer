name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest src/tests/

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: scrim-trimmer-x86_64.AppImage
            artifact_name: scrim-trimmer-linux
          - os: windows-latest
            artifact: scrim-trimmer.exe
            artifact_name: scrim-trimmer-windows
          - os: macos-latest
            artifact: scrim-trimmer
            artifact_name: scrim-trimmer-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ffmpeg tesseract-ocr

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg tesseract

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg --no-progress -y

      - name: Install tesseract (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install tesseract --no-progress -y
          echo "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH

      - name: Verify tools (Windows)
        if: runner.os == 'Windows'
        run: |
          ffmpeg -version
          tesseract --version

      - name: Write YouTube client secrets
        shell: bash
        env:
          CLIENT_SECRETS: ${{ secrets.client_secrets_json }}
        run: |
          if [ -n "$CLIENT_SECRETS" ]; then
            echo "$CLIENT_SECRETS" > src/client_secrets.json
          fi

      - name: Build
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create source archives
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git archive --format=zip --prefix=scrim-trimmer-${TAG}/ HEAD -o scrim-trimmer-${TAG}.zip
          git archive --format=tar.gz --prefix=scrim-trimmer-${TAG}/ HEAD -o scrim-trimmer-${TAG}.tar.gz

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/scrim-trimmer-linux/scrim-trimmer-x86_64.AppImage
            artifacts/scrim-trimmer-windows/scrim-trimmer.exe
            artifacts/scrim-trimmer-macos/scrim-trimmer
            scrim-trimmer-*.zip
            scrim-trimmer-*.tar.gz
