name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest src/tests/

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: scrim-trimmer-x86_64.AppImage
            artifact_name: scrim-trimmer-linux
          - os: windows-latest
            artifact: scrim-trimmer.exe
            artifact_name: scrim-trimmer-windows
          - os: macos-latest
            artifact: scrim-trimmer
            artifact_name: scrim-trimmer-macos

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ffmpeg tesseract-ocr

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg tesseract

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg --no-progress -y

      - name: Install tesseract (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install tesseract --no-progress -y
          echo "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH

      - name: Verify tools (Windows)
        if: runner.os == 'Windows'
        run: |
          ffmpeg -version
          tesseract --version

      - name: Write YouTube client secrets
        shell: bash
        env:
          CLIENT_SECRETS: ${{ secrets.client_secrets_json }}
        run: |
          if [ -n "$CLIENT_SECRETS" ]; then
            echo "$CLIENT_SECRETS" > src/client_secrets.json
          fi

      - name: Build
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7
